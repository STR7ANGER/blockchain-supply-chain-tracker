services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: provenance
      POSTGRES_USER: provenance
      POSTGRES_PASSWORD: provenance
    ports: ["5450:5432"]
    volumes: ["provenance-postgres:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provenance -d provenance"]
      interval: 3s
      timeout: 3s
      retries: 20
  mongo:
    image: mongo:8
    ports: ["27027:27017"]
    volumes: ["provenance-mongo:/data/db"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 20
  redis:
    image: redis:8-alpine
    ports: ["6397:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
volumes:
  provenance-postgres:
  provenance-mongo:
